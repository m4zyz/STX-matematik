<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graftegner - STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <script src="https://unpkg.com/mathlive"></script>

    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>

    <style>
        .graph-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #graph-display {
            background: white;
            border-radius: 10px;
            border: 1px solid #dde2ea;
            overflow: hidden;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .function-row {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .function-row-content {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .function-row math-field {
            flex: 1;
            font-size: 1.15rem;
            border: none;
            outline: none;
        }
        .color-dot {
            width: 14px; height: 14px; min-width: 14px;
            border-radius: 50%;
        }
        .del-btn {
            border: none; background: none; cursor: pointer;
            font-size: 1.1rem; color: #c0c8d4; line-height: 1;
            padding: 2px 4px;
            transition: color 0.15s;
        }
        .del-btn:hover { color: #e74c3c; }
        
        .row-feedback {
            font-size: 0.85rem;
            margin-top: 4px;
            margin-left: 22px;
            color: #636e7b;
            min-height: 1em; 
        }
        .row-error { color: #e74c3c; }
        .row-value { color: #27ae60; font-weight: bold; }

        .add-btn {
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.88rem;
            transition: opacity 0.15s;
            width: 100%;
            margin-top: 5px;
            background: #3498db; color: white;
        }
        .add-btn:hover { opacity: 0.85; }

        .input-sidebar {
            background: #f8f9fb;
            border: 1px solid #dde2ea;
            border-radius: 10px;
            padding: 14px;
        }
    </style>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <header>
            <h1>Interaktiv Graftegner</h1>
            <p class="subtitle">Alt-i-én: Tegn grafer, evaluer udtryk, find skæringer og definer funktioner</p>
        </header>

        <section class="card">
            <div class="graph-container">
                <div class="input-sidebar">
                    <div id="function-list"></div>
                    <button class="add-btn" onclick="addExpressionRow()">+ Tilføj udtryk</button>
                </div>

                <div id="graph-display">
                    <div id="plot-area"></div>
                </div>
            </div>
        </section>

        <script>
        let expressions = [
            { id: 0, latex: 'f(x)=x^2', color: '#3498db' },
            { id: 1, latex: 'g(x)=2x+3', color: '#e74c3c' },
            { id: 2, latex: 'f(x)=g(x)', color: '#f1c40f' } 
        ];

        const COLORS  = ['#3498db','#e74c3c','#27ae60','#f1c40f','#9b59b6','#e67e22', '#16a085', '#d35400'];

        let currentXDomain = [-10, 10];
        let plotInstance   = null;
        let calcTimeout    = null; // Bruges til at forhindre at den mister fokus (Debounce)

        function cleanLatex(latex) {
            let clean = latex
                .replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g, '($1)/($2)')
                .replace(/\\sqrt\{([^{}]*)\}/g, 'sqrt($1)')
                .replace(/\\left/g,  '').replace(/\\right/g, '')
                .replace(/\{/g, '(').replace(/\}/g, ')')
                .replace(/\\cdot/g,  '*').replace(/\\times/g, '*')
                .replace(/\\pi/g,    'PI')
                .replace(/\\sin/g,   'sin').replace(/\\cos/g, 'cos')
                .replace(/\\tan/g,   'tan').replace(/\\ln/g,  'log')
                .replace(/\\/g, '');
            return clean.trim();
        }

        function toJSFunc(exprStr) {
            let s = exprStr
                .replace(/\^/g,       '**')
                .replace(/\bsin\b/g,  'Math.sin')
                .replace(/\bcos\b/g,  'Math.cos')
                .replace(/\btan\b/g,  'Math.tan')
                .replace(/\bsqrt\b/g, 'Math.sqrt')
                .replace(/\blog\b/g,  'Math.log')
                .replace(/\babs\b/g,  'Math.abs')
                .replace(/\bPI\b/g,   'Math.PI');
            return new Function('x', `try { return (${s}); } catch(e) { return NaN; }`);
        }

        function findRootsNumerically(expr1, expr2, xMin, xMax) {
            const STEPS = 2000;
            const dx = (xMax - xMin) / STEPS;
            const roots = [];

            const f1 = toJSFunc(expr1);
            const f2 = toJSFunc(expr2);
            const diff = x => f1(x) - f2(x);

            let prev = diff(xMin);

            for (let i = 1; i <= STEPS; i++) {
                const x = xMin + i * dx;
                const curr = diff(x);

                if (!isFinite(prev) || !isFinite(curr)) { prev = curr; continue; }

                if (prev * curr < 0) {
                    let lo = x - dx, hi = x;
                    for (let j = 0; j < 50; j++) {
                        const mid = (lo + hi) / 2;
                        const fm = diff(mid);
                        if (Math.abs(fm) < 1e-12) { lo = hi = mid; break; }
                        if (diff(lo) * fm <= 0) hi = mid;
                        else lo = mid;
                    }
                    const rx = (lo + hi) / 2;
                    const ry = (f1(rx) + f2(rx)) / 2;

                    if (!roots.some(r => Math.abs(r.x - rx) < 1e-4)) {
                        roots.push({
                            x: Math.round(rx * 1000) / 1000,
                            y: Math.round(ry * 1000) / 1000
                        });
                    }
                }
                prev = curr;
            }
            return roots;
        }

        function parseAndEvaluate() {
            let definedFunctions = {}; 
            let definedByRow = {}; // Holder styr på, hvilken række der definerede funktionen
            let plotData = [];         
            let feedbackMap = {};      
            let intersectionPoints = [];

            function expandFunctions(mathString) {
                let result = mathString;
                for (let [name, body] of Object.entries(definedFunctions)) {
                    let regex = new RegExp(`${name}\\(([^)]+)\\)`, 'g');
                    result = result.replace(regex, (match, arg) => `(${body.replace(/\bx\b/g, `(${arg})`)})`);
                    let regex2 = new RegExp(`\\b${name}\\(x\\)`, 'g');
                    result = result.replace(regex2, `(${body})`);
                }
                return result;
            }

            // Gennemløber alt fra toppen af listen og ned
            expressions.forEach(expr => {
                let raw = expr.latex.trim();
                if (!raw) return;

                let cleaned = cleanLatex(raw);
                let defMatch = cleaned.match(/^([a-zA-Z])\(x\)=(.+)$/);
                let isEquation = false;

                if (defMatch) {
                    let funcName = defMatch[1];
                    let funcBody = defMatch[2];

                    // Tjek om funktionen allerede blev defineret HØJERE OPPE i listen.
                    // Hvis ja, så er det ikke en definition, men en ligning (f.eks. f(x)=g(x))
                    if (definedFunctions[funcName] !== undefined && definedByRow[funcName] !== expr.id) {
                        isEquation = true; 
                    } else {
                        definedFunctions[funcName] = funcBody;
                        definedByRow[funcName] = expr.id;
                        plotData.push({ fn: funcBody, color: expr.color, graphType: 'polyline' });
                        feedbackMap[expr.id] = { type: 'info', text: `Funktion ${funcName}(x) defineret` };
                        return; // Spring videre til næste række
                    }
                }

                // Er det et punkt (x,y)?
                let pointMatch = cleaned.match(/^\(([^,]+),([^,]+)\)$/);
                if (pointMatch) {
                    let xValStr = expandFunctions(pointMatch[1]);
                    let yValStr = expandFunctions(pointMatch[2]);
                    try {
                        let fnX = new Function(`return ${xValStr.replace(/\^/g, '**')}`);
                        let fnY = new Function(`return ${yValStr.replace(/\^/g, '**')}`);
                        let x = fnX();
                        let y = fnY();
                        plotData.push({ points: [[x, y]], fnType: 'points', graphType: 'scatter', color: expr.color });
                        feedbackMap[expr.id] = { type: 'info', text: `Punkt (${Math.round(x*100)/100}, ${Math.round(y*100)/100})` };
                    } catch (e) {
                         feedbackMap[expr.id] = { type: 'error', text: 'Ugyldigt punkt' };
                    }
                    return;
                }

                // Er det en ligning? (Altså indeholder = eller blev fanget som isEquation tidligere)
                if (cleaned.includes('=') || isEquation) {
                    let parts = cleaned.split('=');
                    if (parts.length === 2) {
                        let leftExpanded = expandFunctions(parts[0]);
                        let rightExpanded = expandFunctions(parts[1]);
                        
                        const xMin = currentXDomain[0] - 2;
                        const xMax = currentXDomain[1] + 2;
                        let roots = findRootsNumerically(leftExpanded, rightExpanded, xMin, xMax);
                        
                        if (roots.length > 0) {
                            roots.forEach(r => intersectionPoints.push(r));
                            let rootStrs = roots.map(r => `x ≈ ${r.x} (y ≈ ${r.y})`);
                            feedbackMap[expr.id] = { type: 'value', text: `Skæring: ${rootStrs.join(' ; ')}` };
                        } else {
                            feedbackMap[expr.id] = { type: 'info', text: `Ingen skæringer i vinduet` };
                        }
                    }
                    return;
                }

                // Bare en almindelig funktion (uden y=)
                let expanded = expandFunctions(cleaned);
                if (expanded.includes('x')) {
                     plotData.push({ fn: expanded, color: expr.color, graphType: 'polyline' });
                     return;
                }

                // Evaluering af f.eks. f(2)
                try {
                    let evalStr = expanded.replace(/\^/g, '**')
                                           .replace(/\bsin\b/g, 'Math.sin')
                                           .replace(/\bcos\b/g, 'Math.cos')
                                           .replace(/\bPI\b/g, 'Math.PI');
                    let fn = new Function(`return ${evalStr}`);
                    let val = fn();
                    if (!isNaN(val)) {
                        feedbackMap[expr.id] = { type: 'value', text: `= ${Math.round(val * 1000) / 1000}` };
                    } else {
                        throw new Error();
                    }
                } catch(e) {
                    feedbackMap[expr.id] = { type: 'error', text: '...' };
                }
            });

            if (intersectionPoints.length > 0) {
                plotData.push({
                    points: intersectionPoints.map(p => [p.x, p.y]),
                    fnType: 'points',
                    graphType: 'scatter',
                    color: '#2c3e50' 
                });
            }

            return { plotData, feedbackMap };
        }

        /* ════════════════════════════════════════════
           UI OG RENDERING
        ════════════════════════════════════════════ */
        function addExpressionRow() {
            const id = Date.now();
            const color = COLORS[expressions.length % COLORS.length];
            expressions.push({ id, latex: '', color });
            renderExpressions();
        }

        function removeExpressionRow(id) {
            expressions = expressions.filter(e => e.id !== id);
            renderExpressions();
        }

        function renderExpressions() {
            const list = document.getElementById('function-list');
            list.innerHTML = '';
            
            expressions.forEach((expr) => {
                const row = document.createElement('div');
                row.className = 'function-row';

                const rowContent = document.createElement('div');
                rowContent.className = 'function-row-content';

                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = expr.color;

                const mf = document.createElement('math-field');
                mf.value = expr.latex;
                
                // --- DETTE ER FIXET MED DEBOUNCE ---
                mf.addEventListener('input', () => {
                    expr.latex = mf.value;
                    
                    // Nulstil ventetiden, hvis brugeren taster igen hurtigt
                    clearTimeout(calcTimeout);
                    // Vent 300 millisekunder efter sidste tastetryk med at opdatere grafen
                    calcTimeout = setTimeout(() => {
                        updateCalculations(); 
                    }, 300);
                });

                const del = document.createElement('button');
                del.className = 'del-btn';
                del.innerHTML = '×';
                del.onclick = () => removeExpressionRow(expr.id);

                rowContent.appendChild(dot);
                rowContent.appendChild(mf);
                rowContent.appendChild(del);
                row.appendChild(rowContent);

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'row-feedback';
                feedbackDiv.id = `feedback-${expr.id}`; 
                row.appendChild(feedbackDiv);

                list.appendChild(row);
            });

            updateCalculations();
        }

        function updateCalculations() {
            const { plotData, feedbackMap } = parseAndEvaluate();

            expressions.forEach(expr => {
                const fbDiv = document.getElementById(`feedback-${expr.id}`);
                if (fbDiv) {
                    fbDiv.className = 'row-feedback'; 
                    if (feedbackMap[expr.id]) {
                        fbDiv.textContent = feedbackMap[expr.id].text;
                        if (feedbackMap[expr.id].type === 'error') fbDiv.classList.add('row-error');
                        if (feedbackMap[expr.id].type === 'value') fbDiv.classList.add('row-value');
                    } else {
                        fbDiv.textContent = '';
                    }
                }
            });

            updateGraph(plotData);
        }

        function updateGraph(plotData) {
            if (!plotData || plotData.length === 0) return;

            try {
                const width = document.getElementById('graph-display').clientWidth;
                plotInstance = functionPlot({
                    target: '#plot-area',
                    width:  Math.max(width, 300),
                    height: 420,
                    grid:   true,
                    data:   plotData
                });

                plotInstance.on('all:zoom', function() {
                    try {
                        currentXDomain = plotInstance.meta.xScale.domain();
                    } catch(e) {}
                });
            } catch(e) {
                console.warn('Graf-fejl:', e.message);
            }
        }

        window.onload = () => {
            renderExpressions();
            window.addEventListener('resize', () => updateCalculations());
        };
        </script>
    </main>
</body>
</html>
