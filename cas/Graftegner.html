<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Graftegner - STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <script src="https://unpkg.com/mathlive"></script>
    <script src="https://unpkg.com/nerdamer/nerdamer.core.js"></script>
    <script src="https://unpkg.com/nerdamer/Solve.js"></script>

    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>

    <style>
        .graph-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        @media (max-width: 900px) { .graph-layout { grid-template-columns: 1fr; } }

        .input-sidebar { background: #f8f9fb; border-radius: 12px; padding: 15px; border: 1px solid #dde2ea; }
        .function-row { 
            display: flex; align-items: center; gap: 10px; background: white; 
            padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee;
        }
        .function-row math-field { flex: 1; border: none; font-size: 1.1rem; }
        
        .color-dot { width: 12px; height: 12px; border-radius: 50%; }
        
        #plot-container { background: white; border-radius: 12px; border: 1px solid #dde2ea; min-height: 500px; position: relative; }
        
        .solver-info { 
            margin-top: 15px; padding: 10px; background: #e8f4fd; 
            border-radius: 8px; font-size: 0.9rem; color: #2c3e50; border-left: 4px solid #3498db;
        }
    </style>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <header>
            <h1>Pro Graftegner & Ligningsløser</h1>
            <p class="subtitle">Tegn grafer, plot punkter (x,y) og løs f(x) = g(x)</p>
        </header>

        <section class="card">
            <div class="graph-layout">
                <div class="input-sidebar">
                    <div id="function-list"></div>
                    <button class="btn-small" onclick="addRow()" style="width:100%; margin-top:10px;">+ Tilføj udtryk</button>
                    
                    <div id="solver-results" class="solver-info" style="display:none;">
                        <strong>Løsninger:</strong> <span id="solution-text"></span>
                    </div>
                </div>

                <div id="plot-container">
                    <div id="main-plot"></div>
                </div>
            </div>
        </section>

        <script>
            let rows = [
                { id: 1, val: 'f(x)=x^2', color: '#3498db' },
                { id: 2, val: 'g(x)=x+2', color: '#e74c3c' },
                { id: 3, val: '(2,4)', color: '#2ecc71' }
            ];
            const colorPalette = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6'];

            function addRow() {
                rows.push({ id: Date.now(), val: '', color: colorPalette[rows.length % colorPalette.length] });
                render();
            }

            function cleanMath(latex) {
                return latex.replace(/\\left/g, "").replace(/\\right/g, "")
                            .replace(/{/g, "(").replace(/}/g, ")")
                            .replace(/\\cdot/g, "*").replace(/\\/g, "");
            }

            function update() {
                const plotData = [];
                const definedFuncs = {};
                let solutions = [];

                rows.forEach(row => {
                    let raw = row.val.trim();
                    if (!raw) return;

                    // 1. Tjek for Punkt (x,y)
                    let pointMatch = raw.match(/^\(([^,]+),([^,]+)\)$/);
                    if (pointMatch) {
                        plotData.push({
                            points: [[cleanMath(pointMatch[1]), cleanMath(pointMatch[2])]],
                            fnType: 'points', graphType: 'scatter', color: row.color
                        });
                        return;
                    }

                    // 2. Tjek for Ligning f(x)=g(x)
                    if (raw.includes('=') && (raw.startsWith('f(x)=') || raw.startsWith('g(x)=')) === false) {
                        try {
                            let sides = raw.split('=');
                            // Vi prøver at erstatte funktionsnavne med deres definitioner
                            let eq = cleanMath(raw);
                            for (let name in definedFuncs) {
                                eq = eq.replace(new RegExp(name + "\\(x\\)", "g"), "(" + definedFuncs[name] + ")");
                            }
                            let sol = nerdamer.solve(eq.replace('=', '-'), 'x').toString();
                            solutions.push(`${raw} → x ≈ ${sol}`);
                        } catch(e) {}
                    }

                    // 3. Definition af funktion f(x)=...
                    let funcDef = raw.match(/^([a-z])\(x\)=(.*)/);
                    if (funcDef) {
                        let name = funcDef[1];
                        let body = cleanMath(funcDef[2]);
                        definedFuncs[name] = body;
                        plotData.push({ fn: body, color: row.color });
                    } else if (!raw.includes('=')) {
                        plotData.push({ fn: cleanMath(raw), color: row.color });
                    }
                });

                // Vis løsninger hvis de findes
                const solBox = document.getElementById('solver-results');
                if (solutions.length > 0) {
                    solBox.style.display = 'block';
                    document.getElementById('solution-text').innerText = solutions.join(', ');
                } else {
                    solBox.style.display = 'none';
                }

                try {
                    functionPlot({
                        target: '#main-plot',
                        width: document.getElementById('plot-container').clientWidth,
                        height: 500,
                        grid: true,
                        data: plotData
                    });
                } catch (e) {}
            }

            function render() {
                const list = document.getElementById('function-list');
                list.innerHTML = '';
                rows.forEach((row, idx) => {
                    const div = document.createElement('div');
                    div.className = 'function-row';
                    div.innerHTML = `<div class="color-dot" style="background:${row.color}"></div>`;
                    const mf = document.createElement('math-field');
                    mf.value = row.val;
                    mf.oninput = (e) => { rows[idx].val = e.target.value; update(); };
                    div.appendChild(mf);
                    list.appendChild(div);
                });
                update();
            }

            window.onload = render;
            window.onresize = update;
        </script>
    </main>
</body>
</html>
