<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGebra Vejledning - STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>

    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <header>
            <h1>GeoGebra</h1>
            <p class="subtitle">CAS og Grafværktøj</p>
        </header>

        <section class="card">
            <h2>Interaktiv Graftegner</h2>
            <p>Indtast en funktion for at se grafen (brug f.eks. x^2, sqrt(x) eller sin(x)):</p>
            <div style="text-align: center; margin-bottom: 20px;">
                <input type="text" id="tool-graph-input" value="x^2" style="padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #ccc;">
            </div>
            
            <div style="overflow-x: auto;">
                <div id="mini-geogebra" style="text-align: center; margin: 0 auto;"></div>
            </div>
        </section>
        
        <script>
            // Vi bruger window.onload for at være sikre på at bibliotekerne er hentet
            window.onload = function() {
                const input = document.getElementById('tool-graph-input');
                
                function updateGraph() {
                    const func = input.value.replace(/ /g, ""); // Fjern mellemrum
                    if (!func) return;

                    try {
                        functionPlot({
                            target: '#mini-geogebra',
                            width: 500,
                            height: 350,
                            grid: true,
                            disableZoom: false, // Gør det muligt at zoome ligesom Desmos
                            data: [{ 
                                fn: func, 
                                color: '#3498db',
                                graphType: 'polyline'
                            }]
                        });
                    } catch (err) { 
                        // Vi logger ikke fejlen hver gang man sletter et tegn
                    }
                }

                input.addEventListener('input', updateGraph);
                updateGraph(); // Tegn første gang ved load
            };
        </script>

        <section class="card">
            <h2>Tips til eksamen</h2>
            <p>Husk altid at bruge <strong>kolon-lig-med</strong> (:=) når du definerer funktioner i CAS-vinduet, f.eks. f(x) := 2x + 5.</p>
        </section>
    </main>
</body>
</html>
