<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Træner- STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <section class="card">
            <h2>Matematik Træner</h2>
            
            <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px;">
                <div>
                    <label>Type:</label>
                    <select id="math-type" onchange="generateNewProblem()" style="padding: 5px; border-radius: 4px;">
                        <option value="diff">Differentiation</option>
                        <option value="int">Integration (Ubestemt)</option>
                    </select>
                </div>
                <div>
                    <label>Sværhedsgrad:</label>
                    <select id="math-level" onchange="generateNewProblem()" style="padding: 5px; border-radius: 4px;">
                        <option value="1">Niveau 1 (Let)</option>
                        <option value="2">Niveau 2 (Middel)</option>
                        <option value="3">Niveau 3 (Svær)</option>
                    </select>
                </div>
            </div>
        
            <div id="quiz-container">
                <p id="quiz-question" style="font-size: 1.1em; margin-bottom: 15px;">Indlæser...</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="quiz-answer" placeholder="Dit svar..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <button onclick="checkQuiz()" style="padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Tjek svar</button>
                </div>
                <p id="quiz-feedback" style="margin-top: 10px; font-weight: bold; min-height: 1.2em;"></p>
                <button id="next-btn" onclick="generateNewProblem()" style="display: none; margin-top: 10px; padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Næste opgave</button>
            </div>
        </section> 
        <script>
            let currentAnswer = "";
        
            function generateNewProblem() {
                const feedback = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('next-btn');
                const input = document.getElementById('quiz-answer');
                const questionEl = document.getElementById('quiz-question');
                const type = document.getElementById('math-type').value;
                const level = parseInt(document.getElementById('math-level').value);
                
                feedback.innerHTML = "";
                nextBtn.style.display = "none";
                input.value = "";
                input.disabled = false;
        
                let a = Math.floor(Math.random() * 8) + 2; 
                let n = Math.floor(Math.random() * 3) + 2; 
                let questionText = "";
        
                if (type === "diff") {
                    // DIFFERENTIATION
                    if (level === 1) {
                        let b = Math.floor(Math.random() * 10) + 1;
                        questionText = `Bestem \\( f'(x) \\) for \\( f(x) = ${a}x + ${b} \\)`;
                        currentAnswer = a.toString();
                    } else if (level === 2) {
                        questionText = `Bestem \\( f'(x) \\) for \\( f(x) = x^{${n}} \\)`;
                        currentAnswer = `${n}x^{${n-1}}`.replace('^{1}', '');
                    } else {
                        let b = Math.floor(Math.random() * 5) + 2;
                        questionText = `Bestem \\( f'(x) \\) for \\( f(x) = ${a}x^{${n}} + ${b}x \\)`;
                        currentAnswer = `${a*n}x^{${n-1}} + ${b}`.replace('^{1}', '');
                    }
                } else {
                    // INTEGRATION
                    if (level === 1) {
                        questionText = `Bestem \\( \\int ${a} \\, dx \\) (sæt \\( k=0 \\))`;
                        currentAnswer = `${a}x`;
                    } else if (level === 2) {
                        // Vi bruger x^n hvor n er f.eks 2, så svaret bliver (1/3)x^3
                        questionText = `Bestem \\( \\int x^{${n}} \\, dx \\) (sæt \\( k=0 \\))`;
                        currentAnswer = `(1/${n+1})x^{${n+1}}`;
                    } else {
                        questionText = `Bestem \\( \\int ${a}x + ${n} \\, dx \\) (sæt \\( k=0 \\))`;
                        currentAnswer = `(${a}/2)x^{2} + ${n}x`;
                    }
                }
        
                questionEl.innerHTML = questionText;
        
                // MathJax Refresh
                setTimeout(() => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        MathJax.typesetPromise([questionEl]);
                    }
                }, 10);
            }
        
            function checkQuiz() {
                const userAns = document.getElementById('quiz-answer').value.replace(/\s+/g, '').toLowerCase();
                const feedback = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('next-btn');
                
                // Rens svar for sammenligning
                let cleanCorrect = currentAnswer.replace(/\\/g, '').replace(/\{/g, '').replace(/\}/g, '').replace(/\(/g, '').replace(/\)/g, '').toLowerCase();
                let cleanUser = userAns.replace(/\^/g, '').replace(/\(/g, '').replace(/\)/g, '').replace(/\//g, '/');
        
                // En simpel sammenligning der tjekker for rå tekst match
                if (userAns.includes(cleanCorrect.replace('^', '')) || userAns === cleanCorrect) {
                    feedback.style.color = "#27ae60";
                    feedback.innerHTML = "Korrekt! &#127881;";
                    document.getElementById('quiz-answer').disabled = true;
                    nextBtn.style.display = "inline-block";
                } else {
                    feedback.style.color = "#e74c3c";
                    feedback.innerHTML = "Prøv igen. Husk formatet!";
                }
            }
        
            window.onload = generateNewProblem;
        </script>
    </main>
</body>
</html>
