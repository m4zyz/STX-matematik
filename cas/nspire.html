<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI-Nspire Vejledning - STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <section class="card">
            <h2>Test dig selv</h2>
            <p>Hvad er den afledte funktion af \( f(x) = 5x^2 \)?</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="quiz-answer" placeholder="Dit svar..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <button onclick="checkQuiz()" style="padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Tjek svar</button>
            </div>
            <p id="quiz-feedback" style="margin-top: 10px; font-weight: bold;"></p>
        </section>
        
        <script>
            function checkQuiz() {
                const ans = document.getElementById('quiz-answer').value.replace(/\s+/g, '').toLowerCase();
                const feedback = document.getElementById('quiz-feedback');
                
                // Vi tjekker om svaret er 10x
                if (ans === "10x") {
                    feedback.style.color = "#27ae60";
                    feedback.innerHTML = "Korrekt! Godt arbejdet. &#127881;";
                } else {
                    feedback.style.color = "#e74c3c";
                    feedback.innerHTML = "Ikke helt rigtigt. Husk reglen: \( n \cdot ax^{n-1} \). Prøv igen!";
                }
            }
        </script>
    </main>
</body>
</html>
