<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test dig selv - STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <section class="card">
            <h2>Test dig selv</h2>
            <div id="quiz-container">
                <p id="quiz-question">Indlæser opgave...</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="quiz-answer" placeholder="Dit svar (f.eks. 10x)..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <button onclick="checkQuiz()" style="padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Tjek svar</button>
                </div>
                <p id="quiz-feedback" style="margin-top: 10px; font-weight: bold; min-height: 1.2em;"></p>
                <button id="next-btn" onclick="generateNewProblem()" style="display: none; margin-top: 10px; padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Næste opgave</button>
            </div>
        </section>
        
        <script>
            let currentAnswer = "";
        
            function generateNewProblem() {
                const feedback = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('next-btn');
                const input = document.getElementById('quiz-answer');
                const questionEl = document.getElementById('quiz-question');
                
                feedback.innerHTML = "";
                nextBtn.style.display = "none";
                input.value = "";
                input.disabled = false;
        
                const type = Math.floor(Math.random() * 3); 
                const a = Math.floor(Math.random() * 8) + 2; 
                const n = Math.floor(Math.random() * 4) + 2; 
        
                let questionText = "";
                
                if (type === 0) {
                    const b = Math.floor(Math.random() * 15) + 1;
                    questionText = `Hvad er den afledte funktion af \\( f(x) = ${a}x + ${b} \\)?`;
                    currentAnswer = a.toString();
                } else if (type === 1) {
                    questionText = `Hvad er den afledte funktion af \\( f(x) = x^{${n}} \\)?`;
                    currentAnswer = `${n}x^{${n-1}}`.replace('^{1}', '');
                } else {
                    questionText = `Hvad er den afledte funktion af \\( f(x) = ${a}x^{${n}} \\)?`;
                    currentAnswer = `${a * n}x^{${n-1}}`.replace('^{1}', '');
                }
        
                // Skriv teksten ind
                questionEl.innerHTML = questionText;
        
                // Tving MathJax til at tegne formlen igen
                // Vi bruger en lille timeout for at sikre, at HTML'en er landet i DOM'en
                setTimeout(() => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        MathJax.typesetPromise([questionEl]).catch((err) => console.log(err));
                    } else if (window.MathJax && window.MathJax.typeset) {
                        MathJax.typeset();
                    }
                }, 10);
            }
        
            function checkQuiz() {
                const userAns = document.getElementById('quiz-answer').value.replace(/\s+/g, '').toLowerCase();
                const feedback = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('next-btn');
                const input = document.getElementById('quiz-answer');
        
                // Rens det korrekte svar for alle LaTeX koder så vi kan sammenligne rent
                const cleanCorrect = currentAnswer.replace(/\\/g, '').replace(/\{/g, '').replace(/\}/g, '').toLowerCase();
                
                // Lav en version af brugerens svar uden ^ for at være flink
                const cleanUser = userAns.replace(/\^/g, '');
                const cleanCorrectNoHat = cleanCorrect.replace(/\^/g, '');
        
                if (userAns === cleanCorrect || cleanUser === cleanCorrectNoHat) {
                    feedback.style.color = "#27ae60";
                    feedback.innerHTML = "Korrekt! Godt arbejdet. &#127881;";
                    input.disabled = true;
                    nextBtn.style.display = "inline-block";
                } else {
                    feedback.style.color = "#e74c3c";
                    feedback.innerHTML = "Ikke helt rigtigt. Prøv igen!";
                }
            }
        
            // Start første opgave
            document.addEventListener('DOMContentLoaded', generateNewProblem);
        </script>
    </main>
</body>
</html>
