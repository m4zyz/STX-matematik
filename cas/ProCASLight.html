<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAS- STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/algebrite/1.4.0/algebrite.bundle.js"></script>
    <script src="https://unpkg.com/mathlive"></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <section class="card">
            <h2>Pro CAS-Light</h2>
            <p>Indtast din funktion herunder. Værktøjet viser automatisk det matematiske udtryk.</p>
            
            <div style="background: white; border: 2px solid #3498db; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
                <math-field id="pro-cas-input" style="font-size: 1.5rem; width: 100%; border: none; outline: none;">
                    x^3 + 2x
                </math-field>
            </div>
        
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="proCalculate('diff')" style="flex: 1; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Afledt funktion f'(x)
                </button>
                <button onclick="proCalculate('int')" style="flex: 1; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Ubestemt Integral ∫
                </button>
            </div>
        
            <div id="pro-result-box" style="display: none; background: #f9f9f9; border-left: 5px solid #3498db; padding: 20px; border-radius: 4px;">
                <p style="margin: 0; color: #7f8c8d; font-size: 0.9rem;" id="result-label">Resultat:</p>
                <div id="pro-result-display" style="font-size: 1.8rem; margin-top: 10px;"></div>
            </div>
        </section>
        
        <script>
            function proCalculate(mode) {
                const inputField = document.getElementById('pro-cas-input');
                const resultBox = document.getElementById('pro-result-box');
                const resultDisplay = document.getElementById('pro-result-display');
                const label = document.getElementById('result-label');
        
                // 1. Hent rå værdi. Vi prøver både getValue og .value for at være sikre.
                let rawInput = "";
                try {
                    rawInput = inputField.getValue('ascii-math');
                } catch(e) {
                    rawInput = inputField.value;
                }
        
                // 2. Aggressiv rensning af støj (fjerner LaTeX kommandoer og mærkelige tegn)
                let clean = rawInput
                    .replace(/\\left/g, '(')
                    .replace(/\\right/g, ')')
                    .replace(/\\cdot/g, '*')
                    .replace(/\\times/g, '*')
                    .replace(/{/g, '(')
                    .replace(/}/g, ')')
                    .replace(/\\/g, '')
                    .replace(/ /g, '')
                    .replace(/÷/g, '/');
        
                try {
                    if (!clean || clean.trim() === "") throw new Error("Tomt felt");
        
                    let result = "";
                    
                    // Særlig håndtering af simple tal (konstanter)
                    if (!isNaN(clean)) {
                        if (mode === 'diff') {
                            result = "0"; // Afledte af en konstant er altid 0
                        } else {
                            result = clean + "x"; // Integral af k er kx
                        }
                    } else {
                        // Kør Algebrite for funktioner
                        if (mode === 'diff') {
                            result = Algebrite.run(`d(${clean})`);
                        } else {
                            result = Algebrite.run(`integral(${clean})`);
                        }
                    }
        
                    // Tjek for fejlbeskeder fra motoren
                    if (result.toString().includes("Stop") || result.toString() === "undefined") {
                        throw new Error("Beregning fejlede");
                    }
        
                    // 3. Flot visning via MathJax
                    let finalLatex = Algebrite.run(`printlatex(${result})`).toString().replace(/"/g, '');
                    if (mode === 'int') finalLatex += " + k";
        
                    resultDisplay.innerHTML = "\\[ " + finalLatex + " \\]";
                    resultBox.style.display = "block";
                    
                    if (window.MathJax) {
                        MathJax.typesetPromise([resultDisplay]);
                    }
        
                } catch (err) {
                    console.error("Fejl i CAS:", err);
                    resultDisplay.innerHTML = `<p style="color:red; font-size: 1rem;">Kunne ikke beregne '${clean}'.<br>Prøv f.eks. x^2 + 2x eller cos(x)</p>`;
                    resultBox.style.display = "block";
                }
            }
        </script>
    </main>
</body>
</html>
