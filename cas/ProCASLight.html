<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAS- STX Matematik</title>
    <link rel="stylesheet" href="../style.css">
    <script>window.basePath = "../";</script>
    <script src="../menu.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/algebrite/1.4.0/algebrite.bundle.js"></script>
    <script src="https://unpkg.com/mathlive"></script>
</head>
<body>
    <nav id="sidebar-menu" class="sidebar"></nav>
    <main class="content">
        <section class="card">
            <h2>Pro CAS-Light</h2>
            <p>Indtast din funktion herunder. Værktøjet viser automatisk det matematiske udtryk.</p>
            
            <div style="background: white; border: 2px solid #3498db; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
                <math-field id="pro-cas-input" style="font-size: 1.5rem; width: 100%; border: none; outline: none;">
                    x^3 + 2x
                </math-field>
            </div>
        
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="proCalculate('diff')" style="flex: 1; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Afledt funktion f'(x)
                </button>
                <button onclick="proCalculate('int')" style="flex: 1; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Ubestemt Integral ∫
                </button>
            </div>
        
            <div id="pro-result-box" style="display: none; background: #f9f9f9; border-left: 5px solid #3498db; padding: 20px; border-radius: 4px;">
                <p style="margin: 0; color: #7f8c8d; font-size: 0.9rem;" id="result-label">Resultat:</p>
                <div id="pro-result-display" style="font-size: 1.8rem; margin-top: 10px;"></div>
            </div>
        </section>
        
        <script>
            function proCalculate(mode) {
                const inputField = document.getElementById('pro-cas-input');
                const resultBox = document.getElementById('pro-result-box');
                const resultDisplay = document.getElementById('pro-result-display');
                const label = document.getElementById('result-label');
        
                // 1. Hent rå LaTeX - det er her vi får den bedste data
                let str = inputField.value; 
        
                // 2. Den Store Rense-maskine (Omdanner LaTeX til JS/Algebrite math)
                str = str.replace(/\\frac{([^}]*)}{([^}]*)}/g, "($1)/($2)"); // Brøker
                str = str.replace(/\\left/g, "");                             // Venstre parentes støj
                str = str.replace(/\\right/g, "");                            // Højre parentes støj
                str = str.replace(/{/g, "(").replace(/}/g, ")");              // Krøllede parenteser til runde
                str = str.replace(/\\cdot/g, "*");                            // Gange-prik
                str = str.replace(/\\times/g, "*");                           // Gange-kryds
                str = str.replace(/\\/g, "");                                 // Fjern alle resterende backslashes (fx ved sin, cos)
                str = str.replace(/ /g, "");                                  // Fjern mellemrum
        
                try {
                    let result = "";
                    
                    if (mode === 'diff') {
                        result = Algebrite.run(`d(${str})`);
                        label.innerText = "Den afledte funktion f'(x):";
                    } else {
                        result = Algebrite.run(`integral(${str})`);
                        label.innerText = "Det ubestemte integral ∫ f(x) dx:";
                    }
        
                    // Tjek om Algebrite gav op
                    if (!result || result.toString() === "Stop" || result.toString() === str) {
                        if (mode === 'int' && result.toString() === str) {
                            // Hvis integralet er det samme som input, kunne den ikke løse det
                            throw new Error("Kunne ikke integrere");
                        }
                    }
        
                    // 3. Formater til flot LaTeX visning
                    const latexResult = Algebrite.run(`printlatex(${result})`).toString().replace(/"/g, '');
                    
                    resultDisplay.innerHTML = `\\[ ${latexResult} \\]`;
                    resultBox.style.display = "block";
                    
                    if (window.MathJax) {
                        MathJax.typesetPromise([resultDisplay]);
                    }
                } catch (err) {
                    console.error("CAS Fejl:", err);
                    resultDisplay.innerHTML = "<span style='color:red; font-size: 1rem;'>Kunne ikke beregne dette udtryk. Prøv et simplere format som fx x^2 + 2x.</span>";
                    resultBox.style.display = "block";
                }
            }
        </script>
    </main>
</body>
</html>
